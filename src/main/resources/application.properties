# Server Configuration
server.port=${PORT:8080}

# Database Configuration - Railway PostgreSQL
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:testdb}
spring.datasource.driver-class-name=${DATABASE_URL:org.h2.Driver:org.postgresql.Driver}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=${DATABASE_URL:update:create-drop}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=${DATABASE_URL:org.hibernate.dialect.H2Dialect:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# H2 Database (for local development when DATABASE_URL is not set)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Email Configuration (Optional)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${EMAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# CORS Configuration - Production
spring.web.cors.allowed-origins=${FRONTEND_URL:http://localhost:5173}
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*